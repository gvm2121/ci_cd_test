name: Deploy (stable + debug + fixed ports)

on:
  push:
    branches: [ "main" ]

  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (commit SHA)"
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Definir versión
      - name: Set version
        run: |
          if [ -z "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.sha }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          fi

      # Build imagen
      - name: Build Docker image
        run: docker build -t myhtmlapp:$VERSION .

      # Guardar imagen
      - name: Save Docker image
        run: docker save myhtmlapp:$VERSION > myhtmlapp.tar

      # Copiar al VPS
      - name: Copy image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "myhtmlapp.tar"
          target: "/root/"

      # Deploy remoto
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -ex

            VERSION=${{ env.VERSION }}
            echo "🚀 Deploying version: $VERSION"

            echo "📦 Loading image..."
            docker load < myhtmlapp.tar

            echo "📋 Current containers:"
            docker ps -a

            echo "📦 Available images:"
            docker images

            echo "🧹 Cleaning previous temp container (if exists)..."
            docker stop myhtmlapp_new || true
            docker rm myhtmlapp_new || true

            echo "🚀 Starting test container (no host port)..."
            docker run -d --name myhtmlapp_new myhtmlapp:$VERSION

            echo "📋 Containers after start:"
            docker ps -a

            echo "⏳ Waiting for app..."
            sleep 3

            echo "🩺 Health check..."
            if ! docker exec myhtmlapp_new sh -c 'if command -v curl >/dev/null 2>&1; then curl -fsS http://127.0.0.1/ >/dev/null; else wget -qO- http://127.0.0.1/ >/dev/null; fi'; then
              echo "❌ Health check failed"
              echo "📜 Container logs:"
              docker logs myhtmlapp_new || true
              exit 1
            fi

            echo "🔄 Switching to production (port 80)..."
            docker stop myhtmlapp || true
            docker rm myhtmlapp || true

            echo "🚀 Starting production container..."
            docker run -d -p 80:80 --name myhtmlapp myhtmlapp:$VERSION

            echo "🧹 Cleaning temp container..."
            docker stop myhtmlapp_new || true
            docker rm myhtmlapp_new || true

            echo "📋 Final containers:"
            docker ps -a

            echo "🧹 Cleaning unused images..."
            docker image prune -f

            echo "✅ Deploy successful: $VERSION"
