name: Deploy HTML to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t myhtmlapp .

      - name: Save image
        run: docker save myhtmlapp > myhtmlapp.tar

      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "myhtmlapp.tar"
          target: "/root/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker load < myhtmlapp.tar
            docker stop myhtmlapp || true
            docker rm myhtmlapp || true
            docker run -d -p 80:80 --name myhtmlapp myhtmlapp